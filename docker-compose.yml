services:
  backend:
    build: ./backend
    container_name: cloud-management-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cloud-management-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
