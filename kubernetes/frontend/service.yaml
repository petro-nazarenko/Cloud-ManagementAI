apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cloud-management
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: cloud-management-ai
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
