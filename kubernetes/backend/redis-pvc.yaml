apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: cloud-management
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: cloud-management-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  # storageClassName: standard   # Override per-cluster if needed
