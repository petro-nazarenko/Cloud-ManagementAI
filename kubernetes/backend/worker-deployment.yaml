apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-worker
  namespace: cloud-management
  labels:
    app: backend-worker
    app.kubernetes.io/name: backend-worker
    app.kubernetes.io/part-of: cloud-management-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend-worker
        app.kubernetes.io/name: backend-worker
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend-worker
          image: cloud-mgmt/backend:latest
          imagePullPolicy: Always
          command: ["npm", "run", "worker"]
          env:
            - name: NODE_ENV
              value: production
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-db-secret
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-db-secret
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-db-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-db-secret
                  key: DB_PASSWORD
            - name: DB_SSL
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-db-secret
                  key: DB_SSL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-db-secret
                  key: JWT_SECRET
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-db-secret
                  key: ENCRYPTION_KEY
            - name: REDIS_URL
              value: redis://redis:6379
            - name: QUEUE_MODE
              value: redis
            - name: WORKER_CONCURRENCY
              value: "5"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-provider-secret
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-provider-secret
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-provider-secret
                  key: AWS_DEFAULT_REGION
                  optional: true
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-provider-secret
                  key: AZURE_TENANT_ID
                  optional: true
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-provider-secret
                  key: AZURE_CLIENT_ID
                  optional: true
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-provider-secret
                  key: AZURE_CLIENT_SECRET
                  optional: true
            - name: AZURE_SUBSCRIPTION_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-provider-secret
                  key: AZURE_SUBSCRIPTION_ID
                  optional: true
            - name: GOOGLE_APPLICATION_CREDENTIALS
              valueFrom:
                secretKeyRef:
                  name: cloud-mgmt-provider-secret
                  key: GOOGLE_APPLICATION_CREDENTIALS
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}