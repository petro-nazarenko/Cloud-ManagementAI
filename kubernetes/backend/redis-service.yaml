apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: cloud-management
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: cloud-management-ai
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP