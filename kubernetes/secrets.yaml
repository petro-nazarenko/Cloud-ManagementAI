apiVersion: v1
kind: Secret
metadata:
  name: cloud-mgmt-db-secret
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
type: Opaque
# Base64-encoded values — generate with:
#   echo -n 'yourvalue' | base64
# Or use kubectl create secret generic cloud-mgmt-db-secret \
#   --from-literal=DB_HOST=postgres-service \
#   --from-literal=DB_NAME=cloudmgmt \
#   --from-literal=DB_USER=cloudmgmt_admin \
#   --from-literal=DB_PASSWORD=<secret> \
#   --from-literal=JWT_SECRET=<secret> \
#   --from-literal=ENCRYPTION_KEY=<64-hex-chars>
stringData:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "cloudmgmt"
  DB_USER: "cloudmgmt_admin"
  DB_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"
  DB_SSL: "true"
  JWT_SECRET: "REPLACE_WITH_STRONG_SECRET"
  ENCRYPTION_KEY: "REPLACE_WITH_64_HEX_CHARS"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloud-mgmt-provider-secret
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
type: Opaque
# Populate with real cloud provider credentials before deploying
stringData:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  AZURE_SUBSCRIPTION_ID: ""
  GOOGLE_APPLICATION_CREDENTIALS: ""
