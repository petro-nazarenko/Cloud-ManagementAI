apiVersion: v1
kind: Secret
metadata:
  name: cloud-mgmt-db-secret
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
type: Opaque
# ⚠️  WARNING: Do NOT commit real values to version control.
# This file is intentionally left with placeholder values.
# Populate real values using one of these approaches:
#   1. External Secrets Operator (recommended for production)
#   2. Sealed Secrets: kubeseal to encrypt before committing
#   3. kubectl create secret generic cloud-mgmt-db-secret \
#        --from-literal=DB_HOST=postgres-service \
#        --from-literal=DB_NAME=cloudmgmt \
#        --from-literal=DB_USER=cloudmgmt_admin \
#        --from-literal=DB_PASSWORD='<real-password>' \
#        --from-literal=JWT_SECRET='<real-secret>' \
#        --from-literal=ENCRYPTION_KEY='<64-hex-chars>'
#
# Generate ENCRYPTION_KEY: openssl rand -hex 32
# Generate JWT_SECRET:      openssl rand -base64 48
stringData:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "cloudmgmt"
  DB_USER: "cloudmgmt_admin"
  DB_PASSWORD: "REPLACE_WITH_REAL_PASSWORD_BEFORE_APPLY"
  DB_SSL: "true"
  JWT_SECRET: "REPLACE_WITH_STRONG_RANDOM_SECRET_BEFORE_APPLY"
  ENCRYPTION_KEY: "REPLACE_WITH_64_HEX_CHARS_BEFORE_APPLY"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloud-mgmt-provider-secret
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
type: Opaque
# ⚠️  WARNING: Do NOT commit real credentials to version control.
# Populate provider credentials outside of source control (e.g., via CI/CD
# pipeline secrets, External Secrets Operator, or kubectl directly).
stringData:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  AZURE_SUBSCRIPTION_ID: ""
  GOOGLE_APPLICATION_CREDENTIALS: ""

# ──────────────────────────────────────────────────────────────────────────────
# External Secrets Operator (ESO) — RECOMMENDED FOR PRODUCTION
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace
#
# Then create a SecretStore pointing at your secrets backend (AWS Secrets Manager
# example shown). Replace <REGION>, <ROLE_ARN>, <SECRET_NAME> with real values.
# ──────────────────────────────────────────────────────────────────────────────
---
# SecretStore: tells ESO how to connect to AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1       # Replace with your AWS region
      auth:
        jwt:                  # Use IRSA (IAM Roles for Service Accounts) in EKS
          serviceAccountRef:
            name: external-secrets-sa
---
# ExternalSecret: pulls app DB + security secrets from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloud-mgmt-db-external-secret
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: cloud-mgmt-db-secret       # The Kubernetes Secret to create/update
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: cloud-management-ai/db  # AWS Secrets Manager secret name
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: cloud-management-ai/db
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: cloud-management-ai/db
        property: name
    - secretKey: DB_USER
      remoteRef:
        key: cloud-management-ai/db
        property: user
    - secretKey: DB_PASSWORD
      remoteRef:
        key: cloud-management-ai/db
        property: password
    - secretKey: DB_SSL
      remoteRef:
        key: cloud-management-ai/db
        property: ssl
    - secretKey: JWT_SECRET
      remoteRef:
        key: cloud-management-ai/app
        property: jwt_secret
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: cloud-management-ai/app
        property: encryption_key
---
# ExternalSecret: pulls cloud provider credentials from AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloud-mgmt-provider-external-secret
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: cloud-mgmt-provider-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: cloud-management-ai/providers/aws
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: cloud-management-ai/providers/aws
        property: secret_access_key
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: cloud-management-ai/providers/azure
        property: tenant_id
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: cloud-management-ai/providers/azure
        property: client_id
    - secretKey: AZURE_CLIENT_SECRET
      remoteRef:
        key: cloud-management-ai/providers/azure
        property: client_secret
    - secretKey: AZURE_SUBSCRIPTION_ID
      remoteRef:
        key: cloud-management-ai/providers/azure
        property: subscription_id

