apiVersion: v1
kind: Secret
metadata:
  name: cloud-mgmt-db-secret
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
type: Opaque
# ⚠️  WARNING: Do NOT commit real values to version control.
# This file is intentionally left with placeholder values.
# Populate real values using one of these approaches:
#   1. External Secrets Operator (recommended for production)
#   2. Sealed Secrets: kubeseal to encrypt before committing
#   3. kubectl create secret generic cloud-mgmt-db-secret \
#        --from-literal=DB_HOST=postgres-service \
#        --from-literal=DB_NAME=cloudmgmt \
#        --from-literal=DB_USER=cloudmgmt_admin \
#        --from-literal=DB_PASSWORD='<real-password>' \
#        --from-literal=JWT_SECRET='<real-secret>' \
#        --from-literal=ENCRYPTION_KEY='<64-hex-chars>'
#
# Generate ENCRYPTION_KEY: openssl rand -hex 32
# Generate JWT_SECRET:      openssl rand -base64 48
stringData:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "cloudmgmt"
  DB_USER: "cloudmgmt_admin"
  DB_PASSWORD: "REPLACE_WITH_REAL_PASSWORD_BEFORE_APPLY"
  DB_SSL: "true"
  JWT_SECRET: "REPLACE_WITH_STRONG_RANDOM_SECRET_BEFORE_APPLY"
  ENCRYPTION_KEY: "REPLACE_WITH_64_HEX_CHARS_BEFORE_APPLY"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloud-mgmt-provider-secret
  namespace: cloud-management
  labels:
    app.kubernetes.io/part-of: cloud-management-ai
type: Opaque
# ⚠️  WARNING: Do NOT commit real credentials to version control.
# Populate provider credentials outside of source control (e.g., via CI/CD
# pipeline secrets, External Secrets Operator, or kubectl directly).
stringData:
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_DEFAULT_REGION: "us-east-1"
  AZURE_TENANT_ID: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  AZURE_SUBSCRIPTION_ID: ""
  GOOGLE_APPLICATION_CREDENTIALS: ""
