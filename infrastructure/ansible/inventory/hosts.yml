---
all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

  children:
    webservers:
      hosts:
        web01:
          ansible_host: 10.0.1.10
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/cloud_mgmt_key
        web02:
          ansible_host: 10.0.1.11
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/cloud_mgmt_key
      vars:
        app_version: "latest"
        registry_url: docker.io

    monitoring:
      hosts:
        monitor01:
          ansible_host: 10.0.2.10
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/cloud_mgmt_key
      vars:
        prometheus_retention: 30d
        grafana_admin_password: "{{ vault_grafana_admin_password }}"

    k8s:
      hosts:
        k8s-manager01:
          ansible_host: 10.0.3.10
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/cloud_mgmt_key
          kubeconfig_content: "{{ vault_kubeconfig }}"
      vars:
        kubectl_version: "1.29.3"
        helm_version: "3.14.3"
        namespace: cloud-management

    production:
      children:
        webservers:
        monitoring:
        k8s:
      vars:
        environment: production
        ansible_become: true
        ansible_become_method: sudo
