---
- name: Configure Monitoring Stack (Prometheus & Grafana)
  hosts: monitoring
  become: true
  gather_facts: true

  vars:
    monitoring_dir: /opt/monitoring
    prometheus_config_dir: "{{ monitoring_dir }}/prometheus"
    grafana_config_dir: "{{ monitoring_dir }}/grafana"
    prometheus_data_dir: /var/lib/prometheus
    grafana_data_dir: /var/lib/grafana
    prometheus_version: "2.51.0"
    grafana_version: "10.4.0"
    prometheus_port: 9090
    grafana_port: 3000
    alertmanager_port: 9093

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

  roles:
    - docker

  tasks:
    # ── Directory Setup ──────────────────────────────────────────────────────

    - name: Create monitoring directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ monitoring_dir }}"
        - "{{ prometheus_config_dir }}"
        - "{{ grafana_config_dir }}/provisioning/datasources"
        - "{{ grafana_config_dir }}/provisioning/dashboards"
        - "{{ grafana_config_dir }}/dashboards"
        - "{{ prometheus_data_dir }}"
        - "{{ grafana_data_dir }}"

    - name: Set Prometheus data directory permissions
      file:
        path: "{{ prometheus_data_dir }}"
        owner: "65534"
        group: "65534"
        mode: "0755"

    - name: Set Grafana data directory permissions
      file:
        path: "{{ grafana_data_dir }}"
        owner: "472"
        group: "472"
        mode: "0755"

    # ── Prometheus Configuration ─────────────────────────────────────────────

    - name: Copy Prometheus configuration
      copy:
        src: "{{ playbook_dir }}/../../../monitoring/prometheus/prometheus.yml"
        dest: "{{ prometheus_config_dir }}/prometheus.yml"
        mode: "0644"
      notify: Reload Prometheus

    - name: Copy Prometheus alert rules
      copy:
        src: "{{ playbook_dir }}/../../../monitoring/prometheus/alert_rules.yml"
        dest: "{{ prometheus_config_dir }}/alert_rules.yml"
        mode: "0644"
      notify: Reload Prometheus

    # ── Grafana Provisioning ─────────────────────────────────────────────────

    - name: Copy Grafana datasource configuration
      copy:
        src: "{{ playbook_dir }}/../../../monitoring/grafana/provisioning/datasources/"
        dest: "{{ grafana_config_dir }}/provisioning/datasources/"
        mode: "0644"

    - name: Copy Grafana dashboard provisioning configuration
      copy:
        src: "{{ playbook_dir }}/../../../monitoring/grafana/provisioning/dashboards/"
        dest: "{{ grafana_config_dir }}/provisioning/dashboards/"
        mode: "0644"

    - name: Copy Grafana dashboards
      copy:
        src: "{{ playbook_dir }}/../../../monitoring/grafana/dashboards/"
        dest: "{{ grafana_config_dir }}/dashboards/"
        mode: "0644"

    # ── Deploy Prometheus ────────────────────────────────────────────────────

    - name: Deploy Prometheus container
      community.docker.docker_container:
        name: prometheus
        image: "prom/prometheus:v{{ prometheus_version }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ prometheus_port }}:9090"
        volumes:
          - "{{ prometheus_config_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
          - "{{ prometheus_config_dir }}/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro"
          - "{{ prometheus_data_dir }}:/prometheus"
        command:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus"
          - "--storage.tsdb.retention.time=30d"
          - "--web.enable-lifecycle"
          - "--web.enable-admin-api"
        networks:
          - name: monitoring

    - name: Wait for Prometheus to be healthy
      uri:
        url: "http://localhost:{{ prometheus_port }}/-/healthy"
        status_code: 200
      register: prometheus_health
      until: prometheus_health.status == 200
      retries: 20
      delay: 5

    # ── Deploy Grafana ───────────────────────────────────────────────────────

    - name: Deploy Grafana container
      community.docker.docker_container:
        name: grafana
        image: "grafana/grafana:{{ grafana_version }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "3002:{{ grafana_port }}"
        volumes:
          - "{{ grafana_config_dir }}/provisioning:/etc/grafana/provisioning:ro"
          - "{{ grafana_config_dir }}/dashboards:/var/lib/grafana/dashboards:ro"
          - "{{ grafana_data_dir }}:/var/lib/grafana"
        env:
          GF_SECURITY_ADMIN_USER: admin
          GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
          GF_USERS_ALLOW_SIGN_UP: "false"
          GF_ANALYTICS_REPORTING_ENABLED: "false"
          GF_SERVER_ROOT_URL: "http://{{ ansible_host }}:3002"
        networks:
          - name: monitoring

    - name: Wait for Grafana to be healthy
      uri:
        url: "http://localhost:3002/api/health"
        status_code: 200
      register: grafana_health
      until: grafana_health.status == 200
      retries: 20
      delay: 5

    # ── Verify Alert Rules ───────────────────────────────────────────────────

    - name: Verify Prometheus alert rules are loaded
      uri:
        url: "http://localhost:{{ prometheus_port }}/api/v1/rules"
        return_content: true
      register: rules_response

    - name: Assert alert rules are active
      assert:
        that:
          - rules_response.status == 200
          - "'groups' in rules_response.json.data"
        fail_msg: "Prometheus alert rules not loaded correctly"
        success_msg: "Prometheus alert rules loaded successfully"

  handlers:
    - name: Reload Prometheus
      uri:
        url: "http://localhost:{{ prometheus_port }}/-/reload"
        method: POST
        status_code: 200
      ignore_errors: true
