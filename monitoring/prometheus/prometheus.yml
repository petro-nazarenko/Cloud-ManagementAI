global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: production
    cluster: cloud-management-ai

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      timeout: 10s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # ── Prometheus self-monitoring ───────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
    metrics_path: /metrics

  # ── Backend API ──────────────────────────────────────────────────────────
  - job_name: backend
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: [backend:3001]
        labels:
          service: backend
          team: platform
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ── Node Exporter ────────────────────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
    relabel_configs:
      - source_labels: [__address__]
        regex: "([^:]+).*"
        target_label: hostname
        replacement: "$1"

  # ── cAdvisor (container metrics) ─────────────────────────────────────────
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [container_label_com_docker_compose_service]
        target_label: service

  # ── Docker daemon metrics ─────────────────────────────────────────────────
  - job_name: docker
    static_configs:
      - targets: [host.docker.internal:9323]
